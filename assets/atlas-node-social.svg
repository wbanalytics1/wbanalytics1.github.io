<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Atlas Node by WBAnalytics</title>
  <desc id="desc">Social preview card featuring the Atlas Node infinity and pyramid systems emblem.</desc>
  <defs>
    <filter id="card-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.91 0 0 0 0 0.98 0 0 0 0.7 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset=".54" stop-color="#050914"/>
      <stop offset="1" stop-color="#02040b"/>
    </linearGradient>
    <linearGradient id="card-loop" x1="345" y1="250" x2="855" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8c16a"/>
      <stop offset=".5" stop-color="#f7fdff"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="card-pyramid" x1="510" y1="185" x2="690" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#e8c16a" stop-opacity=".32"/>
    </linearGradient>
    <radialGradient id="card-core" cx="50%" cy="46%" r="58%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".42" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#050914" stop-opacity=".04"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#card-bg)"/>
  <circle cx="980" cy="110" r="290" fill="#67e8f9" fill-opacity=".12"/>
  <circle cx="170" cy="520" r="260" fill="#74a8ff" fill-opacity=".12"/>
  <path d="M0 115h1200M0 235h1200M0 355h1200M0 475h1200M120 0v630M240 0v630M360 0v630M480 0v630M600 0v630M720 0v630M840 0v630M960 0v630M1080 0v630" stroke="#fff" stroke-opacity=".035" stroke-width="1"/>
  <rect x="52" y="48" width="1096" height="534" rx="42" fill="#0c1423" fill-opacity=".58" stroke="#67e8f9" stroke-opacity=".18"/>

  <g transform="translate(300 40) scale(3.75)">
    <circle cx="80" cy="80" r="67" fill="none" stroke="#67e8f9" stroke-opacity=".22" stroke-width="1.2"/>
    <circle cx="80" cy="80" r="52" fill="none" stroke="#74a8ff" stroke-opacity=".2" stroke-width="1" stroke-dasharray="4 16"/>
    <path d="M80 26v108M26 80h108M40 40l80 80M120 40 40 120" fill="none" stroke="#67e8f9" stroke-opacity=".18" stroke-width=".7" stroke-dasharray="2 10"/>
    <path d="M80 39 123 116H37ZM37 116h86M80 39v77" fill="none" stroke="#e8c16a" stroke-opacity=".16" stroke-width=".7" stroke-dasharray="3 10"/>
  </g>

  <g transform="translate(300 40) scale(3.75)" filter="url(#card-glow)">
    <path d="M80 80C64 52 32 52 32 80s32 28 48 0c16-28 48-28 48 0s-32 28-48 0Z" fill="none" stroke="#67e8f9" stroke-opacity=".14" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80 80C64 52 32 52 32 80s32 28 48 0c16-28 48-28 48 0s-32 28-48 0Z" fill="none" stroke="url(#card-loop)" stroke-width="5.9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80 36 126 118H34Z" fill="none" stroke="#e8c16a" stroke-opacity=".12" stroke-width="3.8" stroke-linejoin="round"/>
    <path d="M80 39 123 116H37Z" fill="url(#card-pyramid)" fill-opacity=".36"/>
    <path d="M80 39 80 116H37Z" fill="#67e8f9" fill-opacity=".22"/>
    <path d="M80 39 123 116H80Z" fill="#e8c16a" fill-opacity=".18"/>
    <path d="M80 39 123 116H37Z" fill="none" stroke="#e8c16a" stroke-width="2.05" stroke-linejoin="round"/>
    <path d="M80 39v77M80 80 37 116M80 80l43 36M58 80h44" fill="none" stroke="#fff" stroke-opacity=".48" stroke-width=".78"/>
    <circle cx="80" cy="80" r="7" fill="url(#card-core)" opacity=".74"/>
    <circle cx="37" cy="80" r="2.8" fill="#e8c16a"/>
    <circle cx="123" cy="80" r="2.8" fill="#67e8f9"/>
    <circle cx="80" cy="39" r="2.5" fill="#67e8f9"/>
    <circle cx="80" cy="116" r="2.5" fill="#e8c16a"/>
  </g>

  <text x="84" y="110" fill="#67e8f9" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="22" font-weight="700" letter-spacing="5">WBANALYTICS</text>
  <text x="84" y="504" fill="#f6f8fb" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-4">Atlas Node</text>
  <text x="87" y="548" fill="#aab6c8" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="21" font-weight="600" letter-spacing="2">Systems • Big Data • Cloud • AI • Security</text>
</svg>
