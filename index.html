<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="William David Boggs — Interactive Neural Intelligence Canvas" />
  <title>William David Boggs | Interactive Neural Intelligence Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="static-fallback-bg" aria-hidden="true"></div>
  <canvas id="neural-canvas" aria-hidden="true"></canvas>

  <main class="app-shell" role="main">
    <section class="hero glass-panel" aria-labelledby="owner-name">
      <p class="hero-kicker">Neural Command Surface</p>
      <h1 id="owner-name" data-text="William David Boggs">William David Boggs</h1>
      <p class="hero-subtitle">Interactive Neural Intelligence Canvas</p>
      <div class="hero-actions">
        <a class="action-btn" href="https://wbanalytics1.github.io/" target="_blank" rel="noopener noreferrer">wbanalytics1.github.io</a>
        <a class="action-btn secondary" href="https://github.com/wbanalytics1" target="_blank" rel="noopener noreferrer">GitHub Profile</a>
      </div>
    </section>

    <aside class="control-panel glass-panel" aria-label="Neural visual controls">
      <h2>System Controls</h2>

      <label for="density">Visual Density <span id="density-value">1.00</span></label>
      <input id="density" type="range" min="0.6" max="1.6" step="0.05" value="1" />

      <label for="tempo">Signal Tempo <span id="tempo-value">1.00</span></label>
      <input id="tempo" type="range" min="0.5" max="2" step="0.05" value="1" />

      <label for="learning">Learning Rate (visual) <span id="learning-value">0.04</span></label>
      <input id="learning" type="range" min="0.01" max="0.12" step="0.005" value="0.04" />

      <label for="activation">Activation Function</label>
      <select id="activation">
        <option value="sigmoid">Sigmoid</option>
        <option value="relu">ReLU</option>
        <option value="tanh">Tanh</option>
      </select>

      <div class="control-actions">
        <button id="training-toggle" type="button" aria-pressed="false">Training: Off</button>
        <button id="field-toggle" type="button" aria-pressed="false">Field: Attract</button>
        <button id="signal-burst" type="button">Signal Burst</button>
      </div>
    </aside>
  </main>

  <footer class="identity-band glass-panel" aria-label="Identity and contact">
    <div class="logo-cell" aria-hidden="true">
      <svg viewBox="0 0 120 120" role="img">
        <defs>
          <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6ce9ff" />
            <stop offset="1" stop-color="#7e78ff" />
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="52" fill="#0a1024" stroke="url(#logo-grad)" stroke-width="5" />
        <path d="M22 40 L33 83 L49 50 L60 83 L75 40" fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round" stroke-width="8" />
        <circle cx="92" cy="40" r="8" fill="#95f5ff" opacity="0.9" />
      </svg>
    </div>
    <a href="https://wbanalytics.dev" target="_blank" rel="noopener noreferrer" class="band-link">wbanalytics.dev</a>
    <a href="mailto:david@wbanalytics.dev" class="band-mail">david@wbanalytics.dev</a>
  </footer>

  <noscript>
    <style>
      #neural-canvas { display: none; }
    </style>
  </noscript>
  <script src="script.js" defer></script>
</body>
</html>
