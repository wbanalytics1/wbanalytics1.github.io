<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Taco Braza is coming soon to El Paso with Sinaloa-style tacos and bold borderland flavor." />
  <title>Taco Braza | Coming Soon to El Paso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="coming-soon-page" role="main">
    <section class="coming-soon-hero" aria-labelledby="coming-soon-title">
      <div class="hero-ember hero-ember--left" aria-hidden="true"></div>
      <div class="hero-ember hero-ember--right" aria-hidden="true"></div>

      <div class="coming-soon-hero__content">
        <p class="coming-soon-hero__eyebrow">Coming soon to</p>

        <h1 id="coming-soon-title" class="sr-only">Taco Braza is coming soon to El Paso</h1>

        <div class="coming-soon-wordmark-wrap" aria-hidden="false">
          <img
            class="coming-soon-wordmark"
            src="assets/images/el-paso-wordmark.png"
            alt="EL PASO illustrated wordmark"
            decoding="async"
            fetchpriority="high"
          />
        </div>

        <div class="taco-braza-lockup" aria-label="Taco Braza">
          <span class="taco-braza-lockup__mark">TB</span>
          <span class="taco-braza-lockup__name">Taco Braza</span>
        </div>

        <p class="coming-soon-hero__subtitle">
          Sinaloa-style tacos fired with El Paso borderland flavor.
        </p>

        <a class="coming-soon-hero__cta" href="mailto:hello@tacobraza.com?subject=Taco%20Braza%20El%20Paso%20updates">
          Get opening updates
        </a>
      </div>
    </section>
  </main>
</body>
</html>
